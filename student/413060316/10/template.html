<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <style>
        :root {
            --primary-color: #d63384;
            --secondary-color: #4a1a33;
            --accent-color: #fff0f6;
            --text-color: #495057;
            --bg-color: #fff9fb;
        }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; line-height: 1.8; color: var(--text-color); background-color: var(--bg-color); margin: 0; padding: 0; }
        header { background: linear-gradient(135deg, #ffdeeb 0%, #d63384 100%); color: white; padding: 100px 20px; text-align: center; }
        header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        header p { font-size: 1.2rem; opacity: 0.9; }
        main { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        section { margin-bottom: 60px; border-bottom: 1px solid #eee; padding-bottom: 40px; }
        section:last-of-type { border-bottom: none; }
        h2 { color: var(--primary-color); font-size: 1.8rem; margin-bottom: 25px; position: relative; }
        h2::after { content: ''; display: block; width: 50px; height: 3px; background: var(--primary-color); margin-top: 10px; }
        p { margin-bottom: 20px; text-align: justify; }
        ol { background: var(--accent-color); padding: 30px 40px; border-radius: 10px; margin: 25px 0; }
        li { margin-bottom: 15px; }
        .cta-container { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; margin: 40px 0; }
        .btn { display: inline-block; padding: 12px 30px; border-radius: 50px; text-decoration: none; font-weight: bold; transition: all 0.3s ease; text-align: center; }
        .btn-primary { background-color: var(--primary-color); color: white; box-shadow: 0 4px 15px rgba(230, 126, 34, 0.3); }
        .btn-primary:hover { background-color: #d35400; transform: translateY(-2px); }
        .hstag-container { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 50px; justify-content: center; }
        .hstag { color: #7f8c8d; font-size: 0.9rem; }
        footer { text-align: center; padding: 40px; background: #f9f9f9; color: #95a5a6; font-size: 0.8rem; }
        @media (max-width: 600px) {
            header { padding: 60px 20px; }
            header h1 { font-size: 1.8rem; }
            .cta-container { flex-direction: column; }
            .btn { width: 100%; box-sizing: border-box; }
        }
    </style>
</head>
<body>
    <header>
        <h1>{{ header.h1 }}</h1>
        <p>{{ header.p }}</p>
    </header>
    <main>
        {{#sections}}
        <section>
            <h2>{{ h2 }}</h2>
            {{#paragraphs}}
            <p>{{.}}</p>
            {{/paragraphs}}
            <ol>
                {{#list}}
                <li>{{.}}</li>
                {{/list}}
            </ol>
        </section>
        {{/sections}}
        <div class="cta-container">
            {{#ctas}}
            <a href="#" class="btn btn-primary cta">{{.}}</a>
            {{/ctas}}
        </div>
        <div class="hstag-container">
            {{#hashtags}}
            <div class="hstag">{{.}}</div>
            {{/hashtags}}
        </div>
    </main>
    <footer>
        <p>{{ footer }}</p>
    </footer>
</body>
</html>
